version: 2

models:
  - name: dim_municipalities
    description: >
      Dimension table of all 98 Danish municipalities with region mappings.
      Sourced from the municipality_regions seed. Includes both English region names
      (from the seed) and the corresponding Danish DST API region names for joining
      with housing price data.
    columns:
      - name: municipality_code
        tests: [unique, not_null]
      - name: municipality_name
        tests: [not_null]
      - name: region_name
        description: English region name.
        tests: [not_null]
      - name: region_name_dst
        description: >
          Danish region name as used in DST API responses (EJ56, EJ131).
          Used to join with housing price data from src_price_index.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Region Hovedstaden
                  - Region Sjælland
                  - Region Syddanmark
                  - Region Midtjylland
                  - Region Nordjylland

  - name: fct_housing_prices
    description: >
      Incremental fact table of regional housing price index data.
      Sourced from src_price_index (EJ56). Filtered to one-family houses.
      Region names are in Danish (DST convention) as sourced.
      Grain: one row per region × property category × quarter.
    columns:
      - name: price_index_id
        tests: [unique, not_null]
      - name: region_name_dst
        description: Danish DST region name.
        tests: [not_null]
      - name: region_name
        description: English region name, joined from dim_municipalities.
        tests: [not_null]
      - name: property_category
        tests: [not_null]
      - name: period_quarter
        tests: [not_null]
      - name: period_year
        tests: [not_null]
      - name: price_index
        description: Price index (2022=100). NULL where suppressed by DST.
      - name: pct_change_qoq
      - name: pct_change_yoy

  - name: fct_labour_market_regional
    description: >
      Incremental fact table of region-level annual labour market conditions.
      Aggregates municipality-level unemployment (AUL01) and income (INDKP101)
      to region level via dim_municipalities. Region names use English convention
      (from seed). Grain: one row per region × year.
    columns:
      - name: labour_regional_id
        tests: [unique, not_null]
      - name: region_name
        description: English region name.
        tests: [not_null]
      - name: period_year
        tests: [not_null]
      - name: total_gross_unemployment
      - name: avg_disposable_income_dkk
      - name: municipality_count
