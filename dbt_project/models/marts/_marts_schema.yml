version: 2

models:
  - name: mart_housing_affordability
    description: >
      Region-level view combining housing price index data (EJ56) with labour
      market metrics (AUL01, INDKP101) and absolute prices (EJ131).
      Includes a price-to-income affordability ratio. Grain: region × year.
    columns:
      - name: region_name
        tests: [not_null]
      - name: period_year
        tests: [not_null]
      - name: price_to_income_ratio
        description: Average property price (DKK) as a multiple of average disposable income.

  - name: mart_labour_housing_correlation
    description: >
      Region-level view adding an affordability tier classification on top of
      mart_housing_affordability. Grain: region × year.
    columns:
      - name: region_name
        tests: [not_null]
      - name: period_year
        tests: [not_null]
      - name: affordability_tier
        tests:
          - accepted_values:
              arguments:
                values: ['HIGH_UNAFFORDABILITY', 'MODERATE_UNAFFORDABILITY', 'AFFORDABLE']
